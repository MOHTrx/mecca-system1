<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة مكة - التقديم</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="card">
<h2>شركة مكة - التقديم</h2>

<div id="msg"></div>

<input id="name" placeholder="الاسم الكامل">
<input id="phone" placeholder="الموبايل">
<input id="age" placeholder="السن">

<select id="gov">
<option value="">المحافظة</option>
<option>القاهرة</option>
<option>الجيزة</option>
<option>الشرقية</option>
<option>الإسكندرية</option>
<option>الدقهلية</option>
<option>الغربية</option>
<option>المنوفية</option>
<option>القليوبية</option>
</select>

<select id="edu">
<option>المؤهل</option>
<option>بدون</option>
<option>ثانوية</option>
<option>دبلوم</option>
<option>بكالوريوس</option>
</select>

<select id="exp">
<option>الخبرة</option>
<option>بدون خبرة</option>
<option>1-3 سنوات</option>
<option>أكثر من 3 سنوات</option>
</select>

<button onclick="submit()">إرسال</button>

</div>

<script src="app.js"></script>
</body>
</html>
